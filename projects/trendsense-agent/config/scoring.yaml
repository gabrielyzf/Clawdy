# config/scoring.yaml
# Stage thresholds and score weight defaults. Edit here to retune
# without touching code.

stages:
  observation:
    min_signals: 1
  corroboration:
    min_signals: 3
    min_layers: 2
  thesis:
    min_score: 0.55
  conviction:
    min_score: 0.75
    require_market_or_primary: true
  resolved:
    # Set externally when an idea is closed out.
    min_score: 0.0

# Sub-score weights. Must sum > 0; the engine normalises.
weights:
  signal_density: 0.20
  source_quality: 0.25
  independence: 0.15
  market_confirmation: 0.20
  novelty: 0.10
  risk_flags: 0.10  # subtracted, not added

# Decay: how quickly old signals lose weight. Half-life in hours.
decay:
  half_life_hours: 72
